<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ascot — Tomorrow's Card</title>
<style>
  :root {
    --green-deep: #0b3d2e;
    --green-mid: #144a37;
    --cream: #f6f1e4;
    --paper: #fffdf7;
    --brass: #a8893f;
    --brass-bright: #c9a14a;
    --ink: #1c2420;
    --ink-soft: #4b554e;
    --rule: #d8cfb4;
    font-size: 16px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--cream);
    color: var(--ink);
    font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    -webkit-font-smoothing: antialiased;
  }

  header.masthead {
    background: var(--green-deep);
    color: var(--cream);
    padding: 2.4rem 1.5rem 2rem;
    text-align: center;
    border-bottom: 6px solid var(--brass);
  }

  header.masthead .eyebrow {
    font-family: "Helvetica Neue", Arial, sans-serif;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    font-size: 0.7rem;
    color: var(--brass-bright);
    margin: 0 0 0.6rem;
  }

  header.masthead h1 {
    margin: 0;
    font-weight: 600;
    font-size: clamp(2.4rem, 6vw, 3.6rem);
    letter-spacing: 0.01em;
  }

  header.masthead .meta-date {
    margin: 0.5rem 0 0;
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 0.95rem;
    color: var(--cream);
    opacity: 0.85;
  }

  main {
    max-width: 880px;
    margin: 0 auto;
    padding: 2rem 1.2rem 4rem;
  }

  nav.race-tabs {
    display: flex;
    overflow-x: auto;
    gap: 0.4rem;
    padding: 0 1.2rem;
    margin: 0 auto;
    max-width: 880px;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  nav.race-tabs::-webkit-scrollbar { display: none; }

  nav.race-tabs button {
    flex: 0 0 auto;
    font-family: "Helvetica Neue", Arial, sans-serif;
    background: var(--paper);
    border: 1px solid var(--rule);
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    padding: 0.65rem 1.1rem 0.55rem;
    cursor: pointer;
    color: var(--ink-soft);
    font-size: 0.85rem;
    line-height: 1.2;
    margin-top: 0.6rem;
    transition: background 0.15s, color 0.15s;
  }

  nav.race-tabs button .tab-time {
    display: block;
    font-weight: 700;
    font-size: 1.05rem;
    color: var(--green-deep);
  }

  nav.race-tabs button:hover {
    background: var(--cream);
  }

  nav.race-tabs button.active {
    background: var(--green-deep);
    color: var(--cream);
    border-color: var(--green-deep);
    margin-top: 0;
    padding-top: 0.85rem;
    padding-bottom: 0.75rem;
  }

  nav.race-tabs button.active .tab-time {
    color: var(--brass-bright);
  }

  #status {
    text-align: center;
    font-family: "Helvetica Neue", Arial, sans-serif;
    color: var(--ink-soft);
    padding: 3rem 1rem;
  }

  #status.error { color: #8a3324; }

  .race-card {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 0 4px 4px 4px;
    overflow: hidden;
    box-shadow: 0 1px 0 rgba(0,0,0,0.03);
  }

  .race-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1rem;
    padding: 1.1rem 1.4rem 0.9rem;
    border-bottom: 2px solid var(--green-deep);
    background: linear-gradient(180deg, #fffefb, var(--paper));
  }

  .race-head .off-time {
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
    font-size: 1.9rem;
    color: var(--green-deep);
    min-width: 4.2rem;
  }

  .race-head .race-name {
    flex: 1;
    font-size: 1.15rem;
    line-height: 1.3;
  }

  .race-meta {
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.03em;
    color: var(--ink-soft);
    padding: 0.55rem 1.4rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem 1.1rem;
    background: var(--cream);
    border-bottom: 1px solid var(--rule);
  }

  .race-meta span b { color: var(--ink); font-weight: 600; }

  .view-toggle {
    display: flex;
    gap: 0.4rem;
    padding: 0.6rem 1.4rem;
    background: var(--cream);
    border-bottom: 1px solid var(--rule);
  }

  .view-toggle button {
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid var(--rule);
    border-radius: 3px;
    padding: 0.35rem 0.8rem;
    cursor: pointer;
    color: var(--ink-soft);
  }

  .view-toggle button.active {
    background: var(--green-deep);
    color: var(--cream);
    border-color: var(--green-deep);
  }

  .no-result {
    padding: 2rem 1.4rem;
    text-align: center;
    font-family: "Helvetica Neue", Arial, sans-serif;
    color: var(--ink-soft);
    font-size: 0.9rem;
  }

  td.position {
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
    color: var(--paper);
    background: var(--brass);
    text-align: center;
    width: 1.6rem;
    border-radius: 3px;
    padding: 0.3rem 0.4rem;
  }

  td.position.winner { background: var(--green-deep); }

  td.sp {
    font-family: "Helvetica Neue", Arial, sans-serif;
    color: var(--ink-soft);
    font-size: 0.85rem;
    white-space: nowrap;
  }

  td.horse .name {
    cursor: pointer;
    text-decoration: underline dotted var(--rule);
  }
  td.horse .name:hover { color: var(--green-deep); }

  tr.history-row td {
    background: var(--cream);
    padding: 0;
  }

  .history-panel {
    padding: 0.7rem 1rem;
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 0.8rem;
  }

  .history-panel .loading,
  .history-panel .empty {
    color: var(--ink-soft);
    font-style: italic;
  }

  table.history {
    width: 100%;
    border-collapse: collapse;
    margin-top: 0.2rem;
  }

  table.history th {
    text-align: left;
    font-size: 0.65rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--ink-soft);
    padding: 0.25rem 0.5rem;
  }

  table.history td {
    padding: 0.3rem 0.5rem;
    color: var(--ink);
    border-top: 1px solid var(--rule);
  }

  table.history td.hist-pos {
    font-weight: 700;
    color: var(--green-deep);
    width: 1.4rem;
  }

  table.runners {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.92rem;
  }

  table.runners th {
    text-align: left;
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    padding: 0.5rem 0.7rem;
    border-bottom: 1px solid var(--rule);
  }

  table.runners td {
    padding: 0.65rem 0.7rem;
    border-bottom: 1px solid var(--rule);
    vertical-align: top;
  }

  table.runners tr:last-child td { border-bottom: none; }

  td.number {
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
    color: var(--paper);
    background: var(--green-mid);
    text-align: center;
    width: 1.6rem;
    border-radius: 3px;
    padding: 0.3rem 0.4rem;
  }

  td.draw {
    font-family: "Helvetica Neue", Arial, sans-serif;
    color: var(--ink-soft);
    font-size: 0.8rem;
    text-align: center;
  }

  td.horse .name {
    font-weight: 600;
    cursor: pointer;
    text-decoration: underline dotted var(--rule);
  }
  td.horse .name:hover { color: var(--green-deep); }
  td.horse .breeding {
    display: block;
    font-size: 0.78rem;
    color: var(--ink-soft);
    font-style: italic;
  }

  td.connections {
    font-size: 0.85rem;
    color: var(--ink-soft);
  }
  td.connections .jockey { color: var(--ink); font-weight: 500; }

  td.form {
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 0.8rem;
    color: var(--ink-soft);
    white-space: nowrap;
  }

  footer {
    text-align: center;
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 0.75rem;
    color: var(--ink-soft);
    padding: 1rem 1rem 3rem;
  }

  @media (max-width: 600px) {
    .race-head { padding: 1rem 1rem 0.8rem; }
    .race-meta { padding: 0.5rem 1rem; }
    table.runners th:nth-child(4),
    table.runners td:nth-child(4) { display: none; }
    nav.race-tabs { padding: 0 0.8rem; }
    nav.race-tabs button { padding: 0.55rem 0.8rem 0.45rem; }
    nav.race-tabs button .tab-label { display: none; }
  }

  tr.history-row td {
    background: var(--cream);
    padding: 0;
  }

  .history-panel {
    padding: 0.7rem 1rem;
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 0.8rem;
  }

  .history-panel .loading,
  .history-panel .empty {
    color: var(--ink-soft);
    font-style: italic;
  }

  table.history {
    width: 100%;
    border-collapse: collapse;
    margin-top: 0.2rem;
  }

  table.history th {
    text-align: left;
    font-size: 0.65rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--ink-soft);
    padding: 0.25rem 0.5rem;
  }

  table.history td {
    padding: 0.3rem 0.5rem;
    color: var(--ink);
    border-top: 1px solid var(--rule);
  }

  table.history td.hist-pos {
    font-weight: 700;
    color: var(--green-deep);
    width: 1.4rem;
  }
</style>
</head>
<body>

<header class="masthead">
  <p class="eyebrow">Royal Ascot Racecourse</p>
  <h1>Ascot</h1>
  <p class="meta-date" id="meta-date">Tomorrow's racecard</p>
</header>

<main>
  <div id="status">Loading tomorrow's card…</div>
  <nav class="race-tabs" id="race-tabs"></nav>
  <div id="races"></div>
</main>

<footer>Data via The Racing API · Times and runners subject to change</footer>

<script>
let allRaces = [];
let resultsByRaceId = {};
let activeIndex = 0;
let activeView = "runners";
let horseHistoryCache = {};
let expandedHorseId = null;

async function loadCard() {
  const statusEl = document.getElementById("status");
  const racesEl = document.getElementById("races");
  const dateEl = document.getElementById("meta-date");

  try {
    const res = await fetch("/api/racecard?day=tomorrow");
    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || data.detail || "Request failed");
    }

    const races = data.racecards || [];

    if (races.length === 0) {
      statusEl.textContent = "No races found at Ascot for tomorrow.";
      return;
    }

    races.sort((a, b) => (a.off_dt || a.off_time).localeCompare(b.off_dt || b.off_time));

    allRaces = races;
    resultsByRaceId = data.resultsByRaceId || {};
    activeIndex = 0;
    activeView = "runners";
    expandedHorseId = null;

    dateEl.textContent = `Ascot · ${races[0].date}`;
    statusEl.remove();

    renderTabs();
    renderActiveRace();
  } catch (err) {
    statusEl.textContent = "Couldn't load the racecard. " + err.message;
    statusEl.classList.add("error");
  }
}

function renderTabs() {
  const tabsEl = document.getElementById("race-tabs");
  tabsEl.innerHTML = allRaces
    .map((race, i) => `
      <button class="${i === activeIndex ? "active" : ""}" data-index="${i}">
        <span class="tab-time">${escapeHtml(race.off_time || "")}</span>
        <span class="tab-label">${escapeHtml(shortRaceName(race.race_name))}</span>
      </button>
    `)
    .join("");

  tabsEl.querySelectorAll("button").forEach((btn) => {
    btn.addEventListener("click", () => {
      activeIndex = Number(btn.dataset.index);
      activeView = "runners";
      expandedHorseId = null;
      renderTabs();
      renderActiveRace();
    });
  });
}

function renderActiveRace() {
  const racesEl = document.getElementById("races");
  racesEl.innerHTML = renderRace(allRaces[activeIndex]);

  racesEl.querySelectorAll(".view-toggle button").forEach((btn) => {
    btn.addEventListener("click", () => {
      activeView = btn.dataset.view;
      expandedHorseId = null;
      renderActiveRace();
    });
  });

  racesEl.querySelectorAll("td.horse .name").forEach((nameEl) => {
    nameEl.addEventListener("click", () => {
      const horseId = nameEl.dataset.horseId;
      if (horseId) toggleHorseHistory(horseId);
    });
  });
}

function shortRaceName(name) {
  if (!name) return "";
  return name.length > 28 ? name.slice(0, 26) + "…" : name;
}

function renderRace(race) {
  const result = resultsByRaceId[race.race_id];

  return `
    <section class="race-card">
      <div class="race-head">
        <div class="off-time">${escapeHtml(race.off_time || "")}</div>
        <div class="race-name">${escapeHtml(race.race_name || "")}</div>
      </div>
      <div class="race-meta">
        <span>${escapeHtml(race.race_class || "")}</span>
        <span>${escapeHtml(race.distance_f || "")}f</span>
        <span>${escapeHtml(race.going || "")}</span>
        <span>${escapeHtml(race.age_band || "")}</span>
        <span>${escapeHtml(race.field_size || (race.runners || []).length)} runners</span>
        <span><b>${escapeHtml(race.prize || "")}</b></span>
      </div>
      <div class="view-toggle">
        <button class="${activeView === "runners" ? "active" : ""}" data-view="runners">Runners</button>
        <button class="${activeView === "result" ? "active" : ""}" data-view="result">Result</button>
      </div>
      ${activeView === "result" ? renderResult(result) : renderRunnersTable(race)}
    </section>
  `;
}

function renderRunnersTable(race) {
  const runners = (race.runners || [])
    .slice()
    .sort((a, b) => Number(a.number || 0) - Number(b.number || 0));

  return `
    <table class="runners">
      <thead>
        <tr>
          <th></th>
          <th>Draw</th>
          <th>Horse</th>
          <th>Form</th>
          <th>Jockey / Trainer</th>
        </tr>
      </thead>
      <tbody>
        ${runners.map(renderRunner).join("")}
      </tbody>
    </table>
  `;
}

function renderResult(result) {
  if (!result) {
    return `<div class="no-result">Result not yet available for this race.</div>`;
  }

  const runners = (result.runners || [])
    .slice()
    .sort((a, b) => Number(a.position || 999) - Number(b.position || 999));

  return `
    <table class="runners">
      <thead>
        <tr>
          <th></th>
          <th>Horse</th>
          <th>SP</th>
          <th>Jockey / Trainer</th>
        </tr>
      </thead>
      <tbody>
        ${runners.map(renderResultRow).join("")}
      </tbody>
    </table>
  `;
}

function renderResultRow(r) {
  const pos = r.position || "";
  const isWinner = pos === "1";
  return `
    <tr>
      <td class="position ${isWinner ? "winner" : ""}">${escapeHtml(pos)}</td>
      <td class="horse">
        <span class="name">${escapeHtml(r.horse || "")}</span>
        <span class="breeding">${escapeHtml(r.age || "")}yo ${escapeHtml(r.sex || "")} — ${escapeHtml(r.sire || "")}</span>
      </td>
      <td class="sp">${escapeHtml(r.sp || "")}</td>
      <td class="connections">
        <span class="jockey">${escapeHtml(r.jockey || "")}</span><br/>
        ${escapeHtml(r.trainer || "")}
      </td>
    </tr>
  `;
}

function renderRunner(r) {
  const isExpanded = expandedHorseId === r.horse_id;
  return `
    <tr>
      <td class="number">${escapeHtml(r.number || "")}</td>
      <td class="draw">${escapeHtml(r.draw || "")}</td>
      <td class="horse">
        <span class="name" data-horse-id="${escapeHtml(r.horse_id || "")}" data-horse-name="${escapeHtml(r.horse || "")}">${escapeHtml(r.horse || "")}</span>
        <span class="breeding">${escapeHtml(r.age || "")}yo ${escapeHtml(r.sex || "")} — ${escapeHtml(r.sire || "")}</span>
      </td>
      <td class="form">${escapeHtml(r.form || "—")}</td>
      <td class="connections">
        <span class="jockey">${escapeHtml(r.jockey || "")}</span><br/>
        ${escapeHtml(r.trainer || "")}
      </td>
    </tr>
    ${isExpanded ? `
      <tr class="history-row">
        <td colspan="5">${renderHistoryPanel(r.horse_id)}</td>
      </tr>
    ` : ""}
  `;
}

function renderHistoryPanel(horseId) {
  const cached = horseHistoryCache[horseId];

  if (!cached || cached.loading) {
    return `<div class="history-panel"><span class="loading">Loading last 5 runs…</span></div>`;
  }

  if (cached.error) {
    return `<div class="history-panel"><span class="empty">Couldn't load past results.</span></div>`;
  }

  if (!cached.runs || cached.runs.length === 0) {
    return `<div class="history-panel"><span class="empty">No past results found.</span></div>`;
  }

  return `
    <div class="history-panel">
      <table class="history">
        <thead>
          <tr>
            <th></th>
            <th>Date</th>
            <th>Course</th>
            <th>Dist</th>
            <th>Going</th>
            <th>SP</th>
            <th>Jockey</th>
          </tr>
        </thead>
        <tbody>
          ${cached.runs.map(renderHistoryRow).join("")}
        </tbody>
      </table>
    </div>
  `;
}

function renderHistoryRow(run) {
  return `
    <tr>
      <td class="hist-pos">${escapeHtml(run.position || "")}</td>
      <td>${escapeHtml(run.date || "")}</td>
      <td>${escapeHtml(run.course || "")}</td>
      <td>${escapeHtml(run.distance_f || "")}</td>
      <td>${escapeHtml(run.going || "")}</td>
      <td>${escapeHtml(run.sp || "")}</td>
      <td>${escapeHtml(run.jockey || "")}</td>
    </tr>
  `;
}

async function toggleHorseHistory(horseId) {
  if (expandedHorseId === horseId) {
    expandedHorseId = null;
    renderActiveRace();
    return;
  }

  expandedHorseId = horseId;
  renderActiveRace();

  if (horseHistoryCache[horseId] && !horseHistoryCache[horseId].error) {
    return;
  }

  horseHistoryCache[horseId] = { loading: true };

  try {
    const res = await fetch(`/api/horse-results?horse_id=${encodeURIComponent(horseId)}&limit=5`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Request failed");
    horseHistoryCache[horseId] = { loading: false, runs: data.runs || [] };
  } catch (err) {
    horseHistoryCache[horseId] = { loading: false, error: true };
  }

  if (expandedHorseId === horseId) {
    renderActiveRace();
  }
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

loadCard();
</script>

</body>
</html>
