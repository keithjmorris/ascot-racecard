<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ascot — Tomorrow's Card</title>
<style>
  :root {
    --green-deep: #0b3d2e;
    --green-mid: #144a37;
    --cream: #f6f1e4;
    --paper: #fffdf7;
    --brass: #a8893f;
    --brass-bright: #c9a14a;
    --ink: #1c2420;
    --ink-soft: #4b554e;
    --rule: #d8cfb4;
    font-size: 16px;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--cream);
    color: var(--ink);
    font-family: "Iowan Old Style", "Palatino Linotype", Georgia, serif;
    -webkit-font-smoothing: antialiased;
  }

  header.masthead {
    background: var(--green-deep);
    color: var(--cream);
    padding: 2.4rem 1.5rem 2rem;
    text-align: center;
    border-bottom: 6px solid var(--brass);
  }

  header.masthead .eyebrow {
    font-family: "Helvetica Neue", Arial, sans-serif;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    font-size: 0.7rem;
    color: var(--brass-bright);
    margin: 0 0 0.6rem;
  }

  header.masthead h1 {
    margin: 0;
    font-weight: 600;
    font-size: clamp(2.4rem, 6vw, 3.6rem);
    letter-spacing: 0.01em;
  }

  header.masthead .meta-date {
    margin: 0.5rem 0 0;
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 0.95rem;
    color: var(--cream);
    opacity: 0.85;
  }

  main {
    max-width: 880px;
    margin: 0 auto;
    padding: 2rem 1.2rem 4rem;
  }

  #status {
    text-align: center;
    font-family: "Helvetica Neue", Arial, sans-serif;
    color: var(--ink-soft);
    padding: 3rem 1rem;
  }

  #status.error { color: #8a3324; }

  .race-card {
    background: var(--paper);
    border: 1px solid var(--rule);
    border-radius: 4px;
    margin-bottom: 2rem;
    overflow: hidden;
    box-shadow: 0 1px 0 rgba(0,0,0,0.03);
  }

  .race-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 1rem;
    padding: 1.1rem 1.4rem 0.9rem;
    border-bottom: 2px solid var(--green-deep);
    background: linear-gradient(180deg, #fffefb, var(--paper));
  }

  .race-head .off-time {
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
    font-size: 1.9rem;
    color: var(--green-deep);
    min-width: 4.2rem;
  }

  .race-head .race-name {
    flex: 1;
    font-size: 1.15rem;
    line-height: 1.3;
  }

  .race-meta {
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.03em;
    color: var(--ink-soft);
    padding: 0.55rem 1.4rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem 1.1rem;
    background: var(--cream);
    border-bottom: 1px solid var(--rule);
  }

  .race-meta span b { color: var(--ink); font-weight: 600; }

  table.runners {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.92rem;
  }

  table.runners th {
    text-align: left;
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 0.68rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    padding: 0.5rem 0.7rem;
    border-bottom: 1px solid var(--rule);
  }

  table.runners td {
    padding: 0.65rem 0.7rem;
    border-bottom: 1px solid var(--rule);
    vertical-align: top;
  }

  table.runners tr:last-child td { border-bottom: none; }

  td.number {
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-weight: 700;
    color: var(--paper);
    background: var(--green-mid);
    text-align: center;
    width: 1.6rem;
    border-radius: 3px;
    padding: 0.3rem 0.4rem;
  }

  td.draw {
    font-family: "Helvetica Neue", Arial, sans-serif;
    color: var(--ink-soft);
    font-size: 0.8rem;
    text-align: center;
  }

  td.horse .name { font-weight: 600; }
  td.horse .breeding {
    display: block;
    font-size: 0.78rem;
    color: var(--ink-soft);
    font-style: italic;
  }

  td.connections {
    font-size: 0.85rem;
    color: var(--ink-soft);
  }
  td.connections .jockey { color: var(--ink); font-weight: 500; }

  td.form {
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 0.8rem;
    color: var(--ink-soft);
    white-space: nowrap;
  }

  footer {
    text-align: center;
    font-family: "Helvetica Neue", Arial, sans-serif;
    font-size: 0.75rem;
    color: var(--ink-soft);
    padding: 1rem 1rem 3rem;
  }

  @media (max-width: 600px) {
    .race-head { padding: 1rem 1rem 0.8rem; }
    .race-meta { padding: 0.5rem 1rem; }
    table.runners th:nth-child(4),
    table.runners td:nth-child(4) { display: none; } /* hide form column on mobile */
  }
</style>
</head>
<body >

<header class="masthead">
  <p class="eyebrow">Royal Ascot Racecourse</p>
  <h1>Ascot</h1>
  <p class="meta-date" id="meta-date">Tomorrow's racecard</p>
</header>

<main>
  <div id="status">Loading tomorrow's card…</div>
  <div id="races"></div>
</main>

<footer>Data via The Racing API · Times and runners subject to change</footer>

<script>
async function loadCard() {
  const statusEl = document.getElementById("status");
  const racesEl = document.getElementById("races");
  const dateEl = document.getElementById("meta-date");

  try {
    const res = await fetch("/api/racecard?day=tomorrow");
    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error || data.detail || "Request failed");
    }

    const races = data.racecards || [];

    if (races.length === 0) {
      statusEl.textContent = "No races found at Ascot for tomorrow.";
      return;
    }

    // sort by off time
    races.sort((a, b) => (a.off_dt || a.off_time).localeCompare(b.off_dt || b.off_time));

    dateEl.textContent = `Ascot · ${races[0].date}`;
    statusEl.remove();

    racesEl.innerHTML = races.map(renderRace).join("");
  } catch (err) {
    statusEl.textContent = "Couldn't load the racecard. " + err.message;
    statusEl.classList.add("error");
  }
}

function renderRace(race) {
  const runners = (race.runners || [])
    .slice()
    .sort((a, b) => Number(a.number || 0) - Number(b.number || 0));

  return `
    <section class="race-card">
      <div class="race-head">
        <div class="off-time">${escapeHtml(race.off_time || "")}</div>
        <div class="race-name">${escapeHtml(race.race_name || "")}</div>
      </div>
      <div class="race-meta">
        <span>${escapeHtml(race.race_class || "")}</span>
        <span>${escapeHtml(race.distance_f || "")}f</span>
        <span>${escapeHtml(race.going || "")}</span>
        <span>${escapeHtml(race.age_band || "")}</span>
        <span>${escapeHtml(race.field_size || runners.length)} runners</span>
        <span><b>${escapeHtml(race.prize || "")}</b></span>
      </div>
      <table class="runners">
        <thead>
          <tr>
            <th></th>
            <th>Draw</th>
            <th>Horse</th>
            <th>Form</th>
            <th>Jockey / Trainer</th>
          </tr>
        </thead>
        <tbody>
          ${runners.map(renderRunner).join("")}
        </tbody>
      </table>
    </section>
  `;
}

function renderRunner(r) {
  return `
    <tr>
      <td class="number">${escapeHtml(r.number || "")}</td>
      <td class="draw">${escapeHtml(r.draw || "")}</td>
      <td class="horse">
        <span class="name">${escapeHtml(r.horse || "")}</span>
        <span class="breeding">${escapeHtml(r.age || "")}yo ${escapeHtml(r.sex || "")} — ${escapeHtml(r.sire || "")}</span>
      </td>
      <td class="form">${escapeHtml(r.form || "—")}</td>
      <td class="connections">
        <span class="jockey">${escapeHtml(r.jockey || "")}</span><br/>
        ${escapeHtml(r.trainer || "")}
      </td>
    </tr>
  `;
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

loadCard();
</script>

</body>
</html>
